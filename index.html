<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día Mamá</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:'Arial Black',sans-serif;
}

/* PORTADA */

.portada{
position:fixed;
inset:0;
background:linear-gradient(#ffbdd6,#ff85b5);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:100;
transition:1s;
}

.portada.ocultar{
opacity:0;
pointer-events:none;
}

.portada h1{
color:white;
font-size:55px;
margin-bottom:40px;
font-family:'Arial Black',sans-serif;
text-shadow:0 0 20px #ff0080;
}

.carta{
width:320px;
height:210px;
background:#f7a7c3;
position:relative;
cursor:pointer;
animation:flotar 2s infinite ease-in-out;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.carta::before{
content:"";
position:absolute;
inset:0;
background:#ea8db1;
clip-path:polygon(0 0,50% 50%,0 100%);
}

.carta::after{
content:"";
position:absolute;
inset:0;
background:#ea8db1;
clip-path:polygon(100% 0,50% 50%,100% 100%);
}

.sello{
position:absolute;
top:70px;
left:130px;
font-size:60px;
z-index:5;
}

@keyframes flotar{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

/* TITULO */

.titulo{
position:fixed;
top:10px;
width:100%;
text-align:center;
color:#ffd4ea;
font-size:60px;
font-family:'Arial Black',sans-serif;
z-index:10;
text-shadow:0 0 20px #ff1493;
}

/* CANVAS */

canvas{
position:fixed;
inset:0;
z-index:1;
}

/* FOTO CENTRO */

.foto-centro{
position:fixed;
top:50%;
left:50%;
width:360px;
height:360px;
object-fit:cover;
border-radius:50%;
transform:translate(-50%,-50%);
z-index:6;
border:4px solid white;
box-shadow:
0 0 25px white,
0 0 70px #ff1493;
animation:latido 3s infinite;
}

@keyframes latido{
0%,100%{
transform:translate(-50%,-50%) scale(1);
}
50%{
transform:translate(-50%,-50%) scale(1.05);
}
}

/* FOTO IZQUIERDA */

.foto-izquierda{
position:fixed;
top:15px;
left:20px;
width:250px;
border-radius:25px;
overflow:hidden;
z-index:20;
border:3px solid white;
box-shadow:
0 0 20px #00d9ff,
0 0 40px #00d9ff;
animation:flotarFoto 4s infinite ease-in-out;
}

.foto-izquierda img,
.foto-derecha img,
.foto-abajo-izquierda img{
width:100%;
display:block;
}

@keyframes flotarFoto{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

/* FOTO DERECHA */

.foto-derecha{
position:fixed;
top:15px;
right:20px;
width:250px;
border-radius:25px;
overflow:hidden;
z-index:20;
border:3px solid white;
box-shadow:
0 0 20px #ff66c4,
0 0 40px #ff66c4;
animation:flotarFoto2 4s infinite ease-in-out;
}

@keyframes flotarFoto2{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-20px);
}
}

/* FOTO ABAJO IZQUIERDA */

.foto-abajo-izquierda{
position:fixed;
bottom:90px;
left:20px;
width:250px;
border-radius:25px;
overflow:hidden;
z-index:20;
border:3px solid white;
box-shadow:
0 0 20px #00d9ff,
0 0 40px #ff66c4;
animation:flotarFoto3 4s infinite ease-in-out;
}

@keyframes flotarFoto3{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-18px);
}
}

/* FRASE */

.frase{
position:fixed;
bottom:20px;
width:90%;
left:5%;
text-align:center;
color:white;
font-size:28px;
font-family:'Arial Black',sans-serif;
z-index:30;
text-shadow:
0 0 10px #ff66c4,
0 0 20px #ff1493;
}

/* BOTON */

.zoom-btn{
position:fixed;
right:30px;
bottom:120px;
padding:18px 30px;
border:none;
border-radius:50px;
background:#ff1493;
color:white;
font-size:22px;
font-family:'Arial Black',sans-serif;
cursor:pointer;
z-index:30;
box-shadow:0 0 25px #ff1493;
}

</style>
</head>

<body>

<!-- PORTADA -->

<div class="portada" id="portada">

<h1>¡Feliz Día Mamá! ❤️</h1>

<div class="carta" onclick="abrirCarta()">
<div class="sello">🌹</div>
</div>

<h2 style="
margin-top:35px;
color:white;
font-family:'Arial Black',sans-serif;
">
Toca la carta para abrir ✨
</h2>

</div>

<!-- TITULO -->

<div class="titulo">
Feliz Día Mamá ❤️
</div>

<!-- FOTO IZQUIERDA -->

<div class="foto-izquierda">
<img src="Gemini_Generated_Image_48nr5z48nr5z48nr.png">
</div>

<!-- FOTO ABAJO IZQUIERDA -->

<div class="foto-abajo-izquierda">
<img src="Gemini_Generated_Image_wakinowakinowaki.png">
</div>

<!-- FOTO CENTRAL -->

<img class="foto-centro"
src="Gemini_Generated_Image_q7gd4yq7gd4yq7gd.png">

<!-- FOTO DERECHA -->

<div class="foto-derecha">
<img src="Gemini_Generated_Image_lt8z7ult8z7ult8z.png">
</div>

<!-- FRASE -->

<div class="frase">
"Gracias por darnos la vida a la luz de tus ojos derecho y a la otra luz que está en el ojo izquierdo y juntos vamos a estar para iluminarte tus hijos queridos."
</div>

<!-- BOTON -->

<button class="zoom-btn" onclick="zoomMundo()">
🔍 Acercar Mundo
</button>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* ABRIR CARTA */

window.abrirCarta = function(){

document.getElementById("portada")
.classList.add("ocultar");

}

/* ESCENA */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 45;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

/* ESTRELLAS */

const starsGeometry = new THREE.BufferGeometry();

const starsCount = 12000;

const starsPos = new Float32Array(
starsCount * 3
);

for(let i=0;i<starsCount;i++){

const i3 = i*3;

starsPos[i3] =
(Math.random()-.5)*150;

starsPos[i3+1] =
(Math.random()-.5)*100;

starsPos[i3+2] =
(Math.random()-.5)*100;

}

starsGeometry.setAttribute(
'position',
new THREE.BufferAttribute(starsPos,3)
);

const starsMaterial =
new THREE.PointsMaterial({

color:0x66ccff,
size:.18,
transparent:true,
opacity:.9,
blending:THREE.AdditiveBlending

});

const stars =
new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

/* MUNDO */

const worldGeometry =
new THREE.BufferGeometry();

const worldCount = 8000;

const worldPos =
new Float32Array(worldCount*3);

for(let i=0;i<worldCount;i++){

const i3=i*3;

const theta =
Math.random()*Math.PI*2;

const phi =
Math.acos((Math.random()*2)-1);

const radius = 18;

worldPos[i3] =
radius*Math.sin(phi)
*Math.cos(theta);

worldPos[i3+1] =
radius*Math.sin(phi)
*Math.sin(theta);

worldPos[i3+2] =
radius*Math.cos(phi);

}

worldGeometry.setAttribute(
'position',
new THREE.BufferAttribute(worldPos,3)
);

const worldMaterial =
new THREE.PointsMaterial({

color:0xff1493,
size:.22,
transparent:true,
opacity:.95,
blending:THREE.AdditiveBlending

});

const world =
new THREE.Points(
worldGeometry,
worldMaterial
);

scene.add(world);

/* CORAZON */

const heartGeometry =
new THREE.BufferGeometry();

const heartCount = 3500;

const heartPos =
new Float32Array(heartCount*3);

for(let i=0;i<heartCount;i++){

const t =
Math.random()*Math.PI*2;

const x =
16*Math.pow(Math.sin(t),3);

const y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

const i3=i*3;

heartPos[i3] =
x*.55+(Math.random()-.5)*1.5;

heartPos[i3+1] =
y*.55+18+(Math.random()-.5)*1.5;

heartPos[i3+2] =
(Math.random()-.5)*4;

}

heartGeometry.setAttribute(
'position',
new THREE.BufferAttribute(heartPos,3)
);

const heartMaterial =
new THREE.PointsMaterial({

color:0xff1493,
size:.26,
transparent:true,
blending:THREE.AdditiveBlending

});

const heart =
new THREE.Points(
heartGeometry,
heartMaterial
);

scene.add(heart);

/* PALABRAS */

function createText(text){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = 512;
canvas.height = 180;

ctx.fillStyle="#ffb3ff";
ctx.shadowColor="#ff00ff";
ctx.shadowBlur=25;

ctx.font="bold 55px Arial Black";
ctx.textAlign="center";

ctx.fillText(text,256,100);

const texture =
new THREE.CanvasTexture(canvas);

const material =
new THREE.SpriteMaterial({

map:texture,
transparent:true,
blending:THREE.AdditiveBlending

});

const sprite =
new THREE.Sprite(material);

sprite.scale.set(10,3.5,1);

scene.add(sprite);

return sprite;

}

const textos = [

"Te amo mamá",
"Mi reina",
"Gracias",
"Bendición",
"Mi vida"

];

const palabras=[];

for(let i=0;i<35;i++){

const p =
createText(
textos[
Math.floor(
Math.random()*textos.length
)
]
);

p.userData.angulo =
Math.random()*Math.PI*2;

p.userData.radio =
22+Math.random()*10;

p.userData.altura =
(Math.random()-.5)*24;

p.userData.vel =
0.002+Math.random()*0.005;

palabras.push(p);

}

/* ZOOM */

let zoom=false;

window.zoomMundo = function(){

if(!zoom){

camera.position.z = 20;
zoom=true;

}else{

camera.position.z = 45;
zoom=false;

}

}

/* ANIMACION */

function animate(){

requestAnimationFrame(animate);

stars.rotation.y += 0.0008;

world.rotation.y += 0.006;
world.rotation.x += 0.002;

heart.rotation.y += 0.012;

const t = Date.now()*0.002;

heart.scale.setScalar(
1+Math.sin(t)*0.05
);

palabras.forEach(p=>{

p.userData.angulo +=
p.userData.vel;

p.position.x =
Math.cos(
p.userData.angulo
)
*p.userData.radio;

p.position.z =
Math.sin(
p.userData.angulo
)
*p.userData.radio;

p.position.y =
p.userData.altura +
Math.sin(
t+p.userData.angulo
)*2;

});

renderer.render(scene,camera);

}

animate();

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
